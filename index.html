<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admira Mission Finance</title>
    
    <!-- Configurações de PWA (App) -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F3555">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Admira Mission Finance">
    <link rel="apple-touch-icon" href="Logo Mission Finance icone.png">
    <link rel="icon" type="image/png" href="Logo Mission Finance icone.png">

    <!-- React e Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { 
            background-color: #05121d;
            color: #e2e8f0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .neon-text-orange { text-shadow: 0 0 5px rgba(245, 148, 37, 0.6); }
        .neon-box { 
            box-shadow: 0 0 15px rgba(245, 148, 37, 0.1); 
            border: 1px solid rgba(15, 53, 85, 0.5); 
        }
        
        input, select {
            background-color: #0F3555; 
            color: white;
            border: 1px solid #1e4060;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #F59425;
            box-shadow: 0 0 8px rgba(245, 148, 37, 0.3);
        }
        
        .custom-checkbox { accent-color: #F59425; width: 16px; height: 16px; }

        .fade-in { animation: fadeIn 0.3s ease-in; }
        .animate-pop { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
            .shadow-xl, .neon-box { box-shadow: none !important; border: 1px solid #ddd !important; }
            input, select { background-color: white; color: black; border: 1px solid #ddd; }
            .print\:text-black { color: black !important; text-shadow: none !important; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #05121d; }
        ::-webkit-scrollbar-thumb { background: #0F3555; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #F59425; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect } = React;

        // --- 🚀 CONFIGURAÇÃO FIREBASE (BANCO DE DADOS NA NUVEM) ---
        const isCanvas = typeof __firebase_config !== 'undefined';
        
        // CHAVES OFICIAIS DO SEU PROJETO FIREBASE (ADMIRA MISSION FINANCE)
        const prodConfig = {
            apiKey: "AIzaSyA0OX7tmHEa-XiNxj1pQrHI4UG_8PgZiiE",
            authDomain: "admira-mission-finance.firebaseapp.com",
            projectId: "admira-mission-finance",
            storageBucket: "admira-mission-finance.firebasestorage.app",
            messagingSenderId: "197646588906",
            appId: "1:197646588906:web:410ec395b759c4ae9e7093",
            measurementId: "G-PCNGKHZ0SX"
        };
        
        const firebaseConfig = isCanvas ? JSON.parse(__firebase_config) : prodConfig;
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = isCanvas ? __app_id : 'admira-mission-finance';

        // Ícones SVG
        const Icons = {
            TrendingUp: ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>,
            DollarSign: ({size=20}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>,
            FileText: ({size=20}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>,
            Calculator: ({size=20}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>,
            PlusCircle: ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>,
            MinusCircle: ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line></svg>,
            Trash2: ({size=20}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            Save: ({size=20}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>,
            Filter: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>,
            Printer: ({size=18}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Download: ({size=18}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>,
            HelpCircle: ({size=16, className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>,
            Clock: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            Check: ({size=14}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Repeat: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>,
            Calendar: ({size=16}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            Alert: ({size=24, className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>,
            Rocket: ({size=24, className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"></path><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"></path><path d="M9 12H4s.55-3.03 2-4c1.62-1.1 4-1 4-1"></path><path d="M12 15v5s3.03-.55 4-2c1.1-1.62 1-4 1-4"></path></svg>,
            BookOpen: ({size=20, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>,
            X: ({size=24, className=""}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        };

        const Tooltip = ({ content }) => {
            const [show, setShow] = useState(false);
            return (
                <div className="relative inline-block ml-2 align-middle">
                    <button 
                        className="text-slate-400 hover:text-[#F59425] transition-colors focus:outline-none cursor-help"
                        onMouseEnter={() => setShow(true)}
                        onMouseLeave={() => setShow(false)}
                        onClick={() => setShow(!show)}
                        type="button"
                    >
                        <Icons.HelpCircle size={15} />
                    </button>
                    {show && (
                        <div className="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 w-64 p-3 bg-[#0F3555] text-white text-xs rounded-lg shadow-[0_0_15px_rgba(245,148,37,0.3)] z-50 pointer-events-none fade-in border border-[#F59425]/30">
                            {content}
                            <div className="absolute top-full left-1/2 transform -translate-x-1/2 border-4 border-transparent border-t-[#0F3555]"></div>
                        </div>
                    )}
                </div>
            )
        }

        function App() {
            // --- ESTADOS DE AUTENTICAÇÃO ---
            const [user, setUser] = useState(null);
            const [isLoginMode, setIsLoginMode] = useState(true);
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [isAuthLoading, setIsAuthLoading] = useState(false);

            // --- ESTADOS DA APLICAÇÃO ---
            const [activeTab, setActiveTab] = useState('caixa');
            const [alertConfig, setAlertConfig] = useState(null);
            const [isHelpOpen, setIsHelpOpen] = useState(false); 
            const [transactions, setTransactions] = useState([]); 
            const [updateModal, setUpdateModal] = useState(null); // NOVO: Modal de Atualização/Migração

            // Mantém a sessão ativa
            useEffect(() => {
                if (isCanvas) return; 
                const unsubscribe = onAuthStateChanged(auth, (firebaseUser) => {
                    if (firebaseUser) setUser(firebaseUser);
                });
                return () => unsubscribe();
            }, []);

            // Motor do Login
            const handleAuth = async (e) => {
                e.preventDefault();
                setIsAuthLoading(true);
                try {
                    if (isCanvas) {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                        setUser({ uid: auth.currentUser?.uid || Date.now().toString(), email: authEmail });
                    } else {
                        if (isLoginMode) {
                            const cred = await signInWithEmailAndPassword(auth, authEmail, authPassword);
                            setUser(cred.user);
                        } else {
                            const cred = await createUserWithEmailAndPassword(auth, authEmail, authPassword);
                            setUser(cred.user);
                        }
                    }
                } catch (error) {
                    console.error(error);
                    if (error.code === 'auth/email-already-in-use') {
                        showAlert('Este e-mail já está cadastrado. Tente fazer login.');
                    } else if (error.code === 'auth/wrong-password' || error.code === 'auth/invalid-credential') {
                        showAlert('E-mail ou senha incorretos.');
                    } else {
                        showAlert('Erro: ' + error.message);
                    }
                } finally {
                    setIsAuthLoading(false);
                }
            };

            const handleLogout = async () => {
                await signOut(auth);
                setUser(null);
                setTransactions([]); 
            };

            // --- SINCRONIZAÇÃO COM A NUVEM ---
            useEffect(() => {
                if (!user) return;
                const dbPath = isCanvas
                    ? collection(db, 'artifacts', appId, 'users', user.uid, 'transactions')
                    : collection(db, 'users', user.uid, 'transactions');

                const unsubscribe = onSnapshot(dbPath, (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => data.push({ id: doc.id, ...doc.data() }));
                    setTransactions(data);
                }, (error) => {
                    console.error("Erro no Banco de Dados:", error);
                    showAlert("Erro ao sincronizar dados com a nuvem.");
                });

                return () => unsubscribe();
            }, [user]);

            const saveTransactionToCloud = async (transaction) => {
                if (!user) return;
                const docPath = isCanvas
                    ? doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', transaction.id.toString())
                    : doc(db, 'users', user.uid, 'transactions', transaction.id.toString());
                await setDoc(docPath, transaction);
            };

            const deleteTransactionFromCloud = async (id) => {
                if (!user) return;
                const docPath = isCanvas
                    ? doc(db, 'artifacts', appId, 'users', user.uid, 'transactions', id.toString())
                    : doc(db, 'users', user.uid, 'transactions', id.toString());
                await deleteDoc(docPath);
            };

            // --- HELPERS PARA ALERTAS ---
            const showConfirm = (msg, action) => setAlertConfig({ type: 'confirm', message: msg, onConfirm: action });
            const showAlert = (msg) => setAlertConfig({ type: 'alert', message: msg });
            const closeAlert = () => setAlertConfig(null);

            // --- 🚀 SISTEMA DE MIGRAÇÃO & NOVIDADES ---
            useEffect(() => {
                if (!user) return;
                
                const legacyDataStr = localStorage.getItem('financas_app_transactions');
                const hasSeenUpdate = localStorage.getItem(`has_seen_v2_update_${user.uid}`);

                if (legacyDataStr) {
                    try {
                        const legacyData = JSON.parse(legacyDataStr);
                        if (Array.isArray(legacyData) && legacyData.length > 0) {
                            setUpdateModal({ type: 'migration', data: legacyData });
                        } else {
                            localStorage.removeItem('financas_app_transactions');
                            if (!hasSeenUpdate) setUpdateModal({ type: 'welcome' });
                        }
                    } catch (e) {
                        if (!hasSeenUpdate) setUpdateModal({ type: 'welcome' });
                    }
                } else if (!hasSeenUpdate) {
                    setUpdateModal({ type: 'welcome' });
                }
            }, [user]);

            const handleMigrate = () => {
                if (updateModal && updateModal.data) {
                    updateModal.data.forEach(tx => {
                        saveTransactionToCloud({
                            ...tx,
                            id: tx.id ? tx.id.toString() : Date.now().toString()
                        });
                    });
                }
                localStorage.removeItem('financas_app_transactions');
                localStorage.setItem(`has_seen_v2_update_${user.uid}`, 'true');
                setUpdateModal(null);
                showAlert("Dados antigos migrados com sucesso para a Nuvem! ☁️");
            };

            const handleDismissUpdate = () => {
                localStorage.setItem(`has_seen_v2_update_${user.uid}`, 'true');
                setUpdateModal(null);
            };

            // --- ESTADOS DO FORMULÁRIO DE LANÇAMENTO ---
            const [newDesc, setNewDesc] = useState('');
            const [newAmount, setNewAmount] = useState('');
            const [newType, setNewType] = useState('entrada');
            const [newStatus, setNewStatus] = useState('pago');
            const [newCategory, setNewCategory] = useState('Caixa da Empresa');
            const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);
            
            const [isInstallment, setIsInstallment] = useState(false);
            const [installments, setInstallments] = useState(2);

            const [periodOption, setPeriodOption] = useState('current_month');
            const [filterStart, setFilterStart] = useState('');
            const [filterEnd, setFilterEnd] = useState('');
            const [filterType, setFilterType] = useState('todos');

            useEffect(() => {
                handlePeriodChange({ target: { value: 'current_month' } });
            }, []);

            const totalEntradas = transactions.filter(t => t.type === 'entrada' && t.status === 'pago').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const totalSaidas = transactions.filter(t => t.type === 'saida' && t.status === 'pago').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const saldo = totalEntradas - totalSaidas;

            const totalEntradasPrev = transactions.filter(t => t.type === 'entrada').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const totalSaidasPrev = transactions.filter(t => t.type === 'saida').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const saldoPrevistoTotal = totalEntradasPrev - totalSaidasPrev;

            const getCurrentMonthBalance = () => {
                const now = new Date();
                const currentMonthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                const monthTransactions = transactions.filter(t => t.date.startsWith(currentMonthStr) && t.status === 'pago');
                const income = monthTransactions.filter(t => t.type === 'entrada').reduce((acc, t) => acc + Number(t.amount), 0);
                const expense = monthTransactions.filter(t => t.type === 'saida').reduce((acc, t) => acc + Number(t.amount), 0);
                return income - expense;
            };
            const saldoMesAtual = getCurrentMonthBalance();

            const getCurrentMonthForecast = () => {
                const now = new Date();
                const currentMonthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                const monthTransactions = transactions.filter(t => t.date.startsWith(currentMonthStr));
                const income = monthTransactions.filter(t => t.type === 'entrada').reduce((acc, t) => acc + Number(t.amount), 0);
                const expense = monthTransactions.filter(t => t.type === 'saida').reduce((acc, t) => acc + Number(t.amount), 0);
                return income - expense;
            };
            const saldoPrevistoMesAtual = getCurrentMonthForecast();

            const addTransaction = () => {
                if (!newDesc || !newAmount) return;
                const baseAmount = parseFloat(newAmount);

                if (isInstallment && installments > 1) {
                    const [year, month, day] = newDate.split('-').map(Number);
                    for (let i = 0; i < installments; i++) {
                        const currentMonthIndex = month - 1 + i;
                        const targetYear = year + Math.floor(currentMonthIndex / 12);
                        const targetMonth = currentMonthIndex % 12;
                        const daysInMonth = new Date(targetYear, targetMonth + 1, 0).getDate();
                        const targetDay = Math.min(day, daysInMonth);
                        const dateStr = `${targetYear}-${String(targetMonth + 1).padStart(2, '0')}-${String(targetDay).padStart(2, '0')}`;
                        
                        saveTransactionToCloud({
                            id: (Date.now() + i).toString(),
                            description: `${newDesc} (${i + 1}/${installments})`,
                            amount: baseAmount, 
                            type: newType,
                            status: i === 0 ? newStatus : 'agendado', 
                            category: newCategory,
                            date: dateStr
                        });
                    }
                } else {
                    saveTransactionToCloud({
                        id: Date.now().toString(),
                        description: newDesc,
                        amount: baseAmount,
                        type: newType,
                        status: newStatus,
                        category: newCategory,
                        date: newDate
                    });
                }

                setNewDesc('');
                setNewAmount('');
                setNewCategory('Caixa da Empresa');
                setIsInstallment(false);
                setInstallments(2);
            };

            const removeTransaction = (id) => {
                showConfirm('Tem certeza que deseja excluir este lançamento?', () => {
                    deleteTransactionFromCloud(id);
                });
            };

            const toggleStatus = (id) => {
                const transaction = transactions.find(t => t.id === id);
                if(transaction) {
                    saveTransactionToCloud({ ...transaction, status: transaction.status === 'pago' ? 'agendado' : 'pago' });
                }
            };

            const handleExportBackup = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(transactions));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", `mission_finance_backup_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
                showAlert("Backup exportado com sucesso! Guarde este arquivo em segurança.");
            };

            const handleImportBackup = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        if (Array.isArray(importedData)) {
                            showConfirm("Isso vai enviar todos os dados do backup para a nuvem. Tem certeza?", () => {
                                importedData.forEach(tx => saveTransactionToCloud(tx));
                                showAlert("Dados restaurados para a nuvem com sucesso!");
                            });
                        } else {
                            showAlert("Arquivo de backup inválido.");
                        }
                    } catch (err) {
                        showAlert("Erro ao ler o arquivo. Certifique-se de que é um backup válido.");
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const handlePeriodChange = (e) => {
                const option = e.target ? e.target.value : e; 
                setPeriodOption(option);
                
                const today = new Date();
                let start = '';
                let end = '';

                const toLocalISO = (date) => {
                    const offset = date.getTimezoneOffset();
                    return new Date(date.getTime() - (offset*60*1000)).toISOString().split('T')[0];
                };

                if (option === 'current_month') {
                    start = toLocalISO(new Date(today.getFullYear(), today.getMonth(), 1));
                    end = toLocalISO(new Date(today.getFullYear(), today.getMonth() + 1, 0));
                } else if (option === 'last_month') {
                    start = toLocalISO(new Date(today.getFullYear(), today.getMonth() - 1, 1));
                    end = toLocalISO(new Date(today.getFullYear(), today.getMonth(), 0));
                } else if (option === 'last_7_days') {
                    const past = new Date(today);
                    past.setDate(today.getDate() - 7);
                    start = toLocalISO(past);
                    end = toLocalISO(today);
                } else if (option === 'last_30_days') {
                    const past = new Date(today);
                    past.setDate(today.getDate() - 30);
                    start = toLocalISO(past);
                    end = toLocalISO(today);
                } else if (option === 'today') {
                     start = toLocalISO(today);
                     end = toLocalISO(today);
                }
                
                if (option !== 'custom') {
                    setFilterStart(start);
                    setFilterEnd(end);
                } else {
                    setFilterStart('');
                    setFilterEnd('');
                }
            };

            const getFilteredTransactions = () => {
                return transactions.filter(t => {
                    const matchType = filterType === 'todos' ? true : t.type === filterType;
                    const matchStart = filterStart ? t.date >= filterStart : true;
                    const matchEnd = filterEnd ? t.date <= filterEnd : true;
                    return matchType && matchStart && matchEnd;
                }).sort((a, b) => b.date.localeCompare(a.date));
            };

            const filteredData = getFilteredTransactions();
            const filteredEntradas = filteredData.filter(t => t.type === 'entrada').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const filteredSaidas = filteredData.filter(t => t.type === 'saida').reduce((acc, curr) => acc + Number(curr.amount), 0);
            const filteredSaldo = filteredEntradas - filteredSaidas;

            const exportToCSV = () => {
                const headers = ["Data", "Descrição", "Conta Alocação", "Tipo", "Status", "Valor (R$)"];
                const rows = filteredData.map(t => {
                    let val = Number(t.amount);
                    if (t.type === 'saida') val = -val;
                    return [
                        formatDate(t.date),
                        t.description,
                        t.category || 'Geral',
                        t.type,
                        t.status,
                        val.toFixed(2).replace('.', ',')
                    ];
                });
                const csvContent = "data:text/csv;charset=utf-8," + headers.join(";") + "\n" + rows.map(e => e.join(";")).join("\n");
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `relatorio_financeiro_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const formatDate = (dateString) => {
                if (!dateString) return '-';
                const [year, month, day] = dateString.split('-');
                return `${day}/${month}/${year}`;
            };

            // --- CALCULADORA DE PREÇO JUSTO ---
            const [salary, setSalary] = useState(3000); 
            const [hoursPerDay, setHoursPerDay] = useState(8);
            const [daysPerMonth, setDaysPerMonth] = useState(22);
            
            const hoursPerMonth = hoursPerDay * daysPerMonth;
            const costPerHour = hoursPerMonth > 0 ? salary / hoursPerMonth : 0;

            const [materialCost, setMaterialCost] = useState(50); 
            const [timeSpent, setTimeSpent] = useState(60); 
            const laborCost = (timeSpent / 60) * costPerHour;
            const totalBaseCost = materialCost + laborCost;

            const [taxes, setTaxes] = useState(4); 
            const [cardFee, setCardFee] = useState(4.5);
            const [otherExpenses, setOtherExpenses] = useState(5); 
            const [margin, setMargin] = useState(30);

            const totalVariablePercent = taxes + cardFee + otherExpenses;
            const divisor = (100 - (totalVariablePercent + margin)) / 100;
            const sellingPrice = divisor > 0 ? totalBaseCost / divisor : 0;
            const minDivisor = (100 - totalVariablePercent) / 100;
            const minPrice = minDivisor > 0 ? totalBaseCost / minDivisor : 0;

            // ========================================================================
            // TELA DE LOGIN (COM A SUA LOGO)
            // ========================================================================
            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center px-4 bg-[#05121d] relative overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-[#F59425] rounded-full mix-blend-multiply filter blur-[128px] opacity-10"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-cyan-600 rounded-full mix-blend-multiply filter blur-[128px] opacity-10"></div>

                        <div className="w-full max-w-md bg-[#0F3555]/80 backdrop-blur-xl p-8 rounded-2xl border border-[#F59425]/30 shadow-[0_0_40px_rgba(245,148,37,0.15)] z-10 animate-pop">
                            <div className="flex flex-col items-center mb-8">
                                
                                {/* SUA LOGO AQUI: Círculo aumentado (w-32 h-32) e zoom na imagem (scale-125) */}
                                <div className="w-32 h-32 bg-[#05121d] rounded-full flex items-center justify-center border-2 border-[#F59425]/50 shadow-[0_0_20px_rgba(245,148,37,0.4)] mb-4 overflow-hidden p-1">
                                    <img 
                                        src="Logo Mission Finance icone.png" 
                                        alt="Mission Finance Icon" 
                                        className="w-full h-full object-contain scale-125"
                                        onError={(e) => { 
                                            e.target.onerror = null; 
                                            e.target.style.display = 'none'; 
                                            e.target.nextSibling.style.display = 'block'; 
                                        }} 
                                    />
                                    {/* Fallback caso a imagem não carregue */}
                                    <Icons.Rocket size={50} className="text-[#F59425] hidden" />
                                </div>
                                
                                <h1 className="text-3xl font-bold text-white tracking-tight flex items-baseline">
                                    Ad<span className="text-[#F59425] neon-text-orange">mira</span>
                                </h1>
                                <p className="text-slate-400 text-sm tracking-widest uppercase mt-1 font-bold">Mission Finance</p>
                            </div>

                            <form onSubmit={handleAuth} className="space-y-5">
                                <div>
                                    <label className="text-xs text-slate-400 uppercase font-bold mb-1 block">E-mail de Acesso</label>
                                    <input type="email" required className="w-full p-3 rounded-lg bg-[#05121d] border border-slate-600 text-white focus:border-[#F59425] transition-colors shadow-inner" placeholder="seu@email.com" value={authEmail} onChange={e => setAuthEmail(e.target.value)} />
                                </div>
                                <div>
                                    <div className="flex justify-between items-center mb-1">
                                        <label className="text-xs text-slate-400 uppercase font-bold">Senha</label>
                                        {isLoginMode && <a href="#" className="text-xs text-[#F59425] hover:text-orange-400 underline">Esqueceu a senha?</a>}
                                    </div>
                                    <input type="password" required className="w-full p-3 rounded-lg bg-[#05121d] border border-slate-600 text-white focus:border-[#F59425] transition-colors shadow-inner" placeholder="••••••••" value={authPassword} onChange={e => setAuthPassword(e.target.value)} />
                                </div>

                                <button type="submit" disabled={isAuthLoading} className="w-full bg-[#F59425] text-white p-3 rounded-lg font-bold uppercase tracking-wider hover:bg-orange-600 transition-all shadow-[0_0_15px_rgba(245,148,37,0.4)] disabled:opacity-50 flex justify-center items-center gap-2 mt-2">
                                    {isAuthLoading ? <Icons.Repeat size={20} className="animate-spin" /> : (isLoginMode ? 'Entrar no Sistema' : 'Ativar Minha Conta')}
                                </button>
                            </form>

                            <div className="mt-6 text-center text-sm text-slate-400">
                                {isLoginMode ? (
                                    <p>Ainda não tem acesso? <button type="button" onClick={() => setIsLoginMode(false)} className="text-[#F59425] font-bold hover:underline">Assine agora</button></p>
                                ) : (
                                    <p>Já tem uma assinatura? <button type="button" onClick={() => setIsLoginMode(true)} className="text-[#F59425] font-bold hover:underline">Fazer login</button></p>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            // ========================================================================
            // DASHBOARD PRINCIPAL (Mostrado após o Login)
            // ========================================================================
            return (
                <div className="max-w-5xl mx-auto my-4 bg-[#0F3555] rounded-xl shadow-2xl overflow-hidden border border-[#0F3555] print:shadow-none print:border-none print:my-0 print:w-full min-h-[90vh]">
                    
                    {/* Header */}
                    <div className="bg-[#0F3555]/50 backdrop-blur border-b border-[#F59425]/20 p-6 flex justify-between items-center print:bg-white print:text-black">
                        <div>
                            <h1 className="text-2xl font-bold flex items-center gap-3 text-white select-none print:text-black">
                                
                                {/* LOGO NO CABEÇALHO: Tamanho aumentado (w-14 h-14) e zoom aplicado (scale-125) */}
                                <img 
                                    src="Logo Mission Finance icone.png" 
                                    alt="Logo" 
                                    className="w-14 h-14 object-contain scale-125 print:hidden drop-shadow-[0_0_8px_rgba(245,148,37,0.5)]"
                                    onError={(e) => { 
                                        e.target.onerror = null; 
                                        e.target.style.display = 'none'; 
                                        e.target.nextSibling.style.display = 'block'; 
                                    }} 
                                />
                                <Icons.TrendingUp className="print:hidden hidden text-[#F59425]" />
                                
                                <div className="flex items-baseline">
                                    <span className="text-white tracking-tight print:text-black">Ad<span className="text-[#F59425] neon-text-orange print:text-black print:shadow-none">mira</span></span>
                                    <span className="text-white ml-2 print:text-black hidden md:inline-block">Mission Finance</span>
                                </div>
                            </h1>
                            <h1 className="hidden print:block text-2xl font-bold text-black mb-1">
                                Admira Mission Finance
                            </h1>
                            <p className="text-slate-400 text-sm mt-1 print:hidden">Controle Financeiro & Precificação</p>
                        </div>
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={() => showConfirm("Deseja realmente sair da sua conta?", handleLogout)}
                                className="hidden md:flex items-center gap-2 text-slate-400 hover:text-red-400 transition-colors bg-[#05121d] px-3 py-1.5 rounded-full border border-slate-700 text-sm font-bold print:hidden"
                                title="Sair da Conta"
                            >
                                Sair
                            </button>
                            
                            <button 
                                onClick={() => setIsHelpOpen(true)}
                                className="hidden md:flex items-center gap-2 text-[#F59425] hover:text-white transition-colors bg-[#05121d] px-3 py-1.5 rounded-full border border-[#F59425]/30 text-sm font-bold print:hidden"
                            >
                                <Icons.BookOpen size={16} />
                                Ajuda / Backup
                            </button>
                            <div className="text-right">
                                <p className="text-sm text-slate-400 print:text-black">Saldo Real (Caixa)</p>
                                <p className={`text-2xl font-bold ${saldo >= 0 ? 'text-emerald-400' : 'text-red-400'} print:text-black`}>
                                    R$ {saldo.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* Navegação */}
                    <div className="flex border-b border-[#F59425]/20 bg-[#05121d]/50 no-print overflow-x-auto">
                        <button onClick={() => setActiveTab('caixa')} className={`flex-1 py-4 px-2 whitespace-nowrap flex justify-center items-center gap-2 font-medium transition-all ${activeTab === 'caixa' ? 'text-[#F59425] border-b-2 border-[#F59425] bg-[#0F3555]' : 'text-slate-400 hover:text-white hover:bg-[#0F3555]'}`}>
                            <Icons.DollarSign size={18} /> Fluxo de Caixa
                        </button>
                        <button onClick={() => setActiveTab('relatorios')} className={`flex-1 py-4 px-2 whitespace-nowrap flex justify-center items-center gap-2 font-medium transition-all ${activeTab === 'relatorios' ? 'text-[#F59425] border-b-2 border-[#F59425] bg-[#0F3555]' : 'text-slate-400 hover:text-white hover:bg-[#0F3555]'}`}>
                            <Icons.FileText size={18} /> Relatórios
                        </button>
                        <button onClick={() => setActiveTab('precificacao')} className={`flex-1 py-4 px-2 whitespace-nowrap flex justify-center items-center gap-2 font-medium transition-all ${activeTab === 'precificacao' ? 'text-[#F59425] border-b-2 border-[#F59425] bg-[#0F3555]' : 'text-slate-400 hover:text-white hover:bg-[#0F3555]'}`}>
                            <Icons.Calculator size={18} /> Preço Justo
                        </button>
                    </div>

                    <div className="p-6">
                        {/* --- ABA FLUXO DE CAIXA --- */}
                        {activeTab === 'caixa' && (
                            <div className="fade-in">
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                    <div className="bg-[#0F3555] p-4 rounded-lg border border-[#F59425]/20 flex justify-between items-center neon-box">
                                        <div><p className="text-emerald-400 text-sm font-bold uppercase">Entradas (Real)</p><p className="text-lg font-bold text-white">R$ {totalEntradas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p></div>
                                        <Icons.PlusCircle className="text-emerald-400 h-8 w-8" />
                                    </div>
                                    <div className="bg-[#0F3555] p-4 rounded-lg border border-[#F59425]/20 flex justify-between items-center shadow-lg">
                                        <div><p className="text-red-400 text-sm font-bold uppercase">Saídas (Real)</p><p className="text-lg font-bold text-white">R$ {totalSaidas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p></div>
                                        <Icons.MinusCircle className="text-red-400 h-8 w-8" />
                                    </div>
                                    <div className="bg-[#05121d] p-4 rounded-lg border border-[#F59425]/30 flex justify-between items-center">
                                        <div>
                                            <p className="text-[#F59425] text-sm font-bold uppercase flex items-center gap-1"><Icons.Calendar size={14} /> Saldo do Mês</p>
                                            <p className={`text-lg font-bold ${saldoMesAtual >= 0 ? 'text-emerald-400' : 'text-orange-400'}`}>R$ {saldoMesAtual.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                            <p className="text-[10px] text-slate-500">Mês Atual (Pago)</p>
                                        </div>
                                    </div>
                                    <div className="bg-[#05121d] p-4 rounded-lg border border-slate-700 flex justify-between items-center">
                                        <div>
                                            <p className="text-slate-400 text-sm font-bold uppercase flex items-center gap-1"><Icons.Clock size={14} /> Previsto (Mês)</p>
                                            <p className={`text-lg font-bold ${saldoPrevistoMesAtual >= 0 ? 'text-cyan-400' : 'text-yellow-400'}`}>R$ {saldoPrevistoMesAtual.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                                            <p className="text-[10px] text-slate-500">Mês Atual (Inclui Futuros)</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-[#0F3555] p-5 rounded-lg mb-6 border border-[#F59425]/20 shadow-lg no-print">
                                    <h3 className="text-sm font-bold text-slate-300 mb-3 uppercase flex items-center gap-2"><Icons.PlusCircle className="w-4 h-4 text-[#F59425]" /> Novo Lançamento</h3>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-12 gap-3">
                                        <div className="md:col-span-2">
                                            <label className="text-[10px] text-slate-400 uppercase">Data</label>
                                            <input type="date" className="w-full p-2 rounded" value={newDate} onChange={(e) => setNewDate(e.target.value)} />
                                        </div>
                                        <div className="md:col-span-4">
                                            <label className="text-[10px] text-slate-400 uppercase">Descrição</label>
                                            <input type="text" placeholder="Ex: Venda Cliente X" className="w-full p-2 rounded" value={newDesc} onChange={(e) => setNewDesc(e.target.value)} />
                                        </div>
                                        <div className="md:col-span-3">
                                            <label className="text-[10px] text-slate-400 uppercase">Conta de Alocação</label>
                                            <select className="w-full p-2 rounded border border-[#F59425]/30 bg-[#0F3555] text-white" value={newCategory} onChange={(e) => setNewCategory(e.target.value)}>
                                                <option value="Caixa da Empresa">🏢 Caixa da Empresa</option>
                                                <option value="Pró-Labore">👤 Pró-Labore (Sócio)</option>
                                                <option value="Fundo de Reserva">🛡️ Reserva & Passivos</option>

                                            </select>

                                        <div className="md:col-span-3">
                                            <label className="text-[10px] text-slate-400 uppercase">Valor (R$)</label>

                                        <div className="md:col-span-3">

                                        <div className="md:col-span-3">

                                                <option value="pago">✅ Confirmado</option>
                                                <option value="agendado">📅 Agendado</option>
                                            </select>
                                        </div>
                                        
                                        <div className="md:col-span-6 flex items-center gap-4 bg-[#05121d] p-2 rounded border border-slate-700 mt-1 md:mt-4 h-[42px]">
                                            <label className="flex items-center gap-2 cursor-pointer text-sm text-white select-none">
                                                <input type="checkbox" className="custom-checkbox rounded" checked={isInstallment} onChange={(e) => setIsInstallment(e.target.checked)} />
                                                <Icons.Repeat size={16} />
                                                Repetir / Parcelar?
                                            </label>
                                            
                                            {isInstallment && (
                                                <div className="flex items-center gap-2 fade-in">
                                                    <span className="text-xs text-slate-400">Qtd. Meses:</span>
                                                    <input 
                                                        type="number" 
                                                        min="2" max="60" 
                                                        className="w-20 p-1 rounded text-center text-sm border border-[#F59425]" 
                                                        value={installments} 
                                                        onChange={(e) => setInstallments(Number(e.target.value))} 
                                                    />
                                                </div>
                                            )}
                                        </div>

                                        <div className="md:col-span-12 mt-2">
                                            <button onClick={addTransaction} className="w-full bg-[#F59425] text-white p-3 rounded hover:bg-orange-600 flex justify-center items-center gap-2 shadow-[0_0_10px_#F59425] transition-all font-bold text-sm uppercase"><Icons.Save size={18} /> Adicionar Lançamento</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="overflow-x-auto rounded-lg border border-[#F59425]/20">
                                    <table className="w-full text-left text-sm text-slate-300">
                                        <thead className="bg-[#05121d] text-slate-400 uppercase font-semibold"><tr className="border-b border-[#F59425]/20"><th className="p-3">Data</th><th className="p-3">Descrição</th><th className="p-3 text-center">Status</th><th className="p-3 text-right">Valor</th><th className="p-3 text-center w-16 no-print">X</th></tr></thead>
                                        <tbody className="divide-y divide-[#F59425]/10">
                                            {transactions.sort((a,b) => b.date.localeCompare(a.date)).slice(0, 15).map((t) => (
                                                <tr key={t.id} className={`hover:bg-[#05121d]/50 ${t.status === 'agendado' ? 'opacity-70 italic' : ''}`}>
                                                    <td className="p-3 whitespace-nowrap">{formatDate(t.date)}</td>
                                                    <td className="p-3 font-medium text-white">
                                                        {t.description}
                                                        <span className="ml-2 text-[9px] px-2 py-0.5 rounded-full border border-slate-600 bg-slate-800/50 text-slate-300 hidden md:inline-block">
                                                            {t.category || 'Geral'}
                                                        </span>
                                                    </td>
                                                    <td className="p-3 text-center cursor-pointer" onClick={() => toggleStatus(t.id)} title="Clique para alterar status">
                                                        {t.status === 'pago'

                                                    <td className="p-3 text-center no-print"><button onClick={() => removeTransaction(t.id)} className="text-slate-500 hover:text-red-400"><Icons.Trash2 size={16} /></button></td>

                                        </tbody>

                        {/* --- ABA RELATÓRIOS --- */}
                        {activeTab === 'relatorios' && (

                                <div className="flex gap-3 justify-center">

                                            <li><strong>Valor da Hora:</strong> Defina seu salário desejado e horas de trabalho.</li>
                                            <li><strong>Custo de Produção:</strong> Some materiais + tempo gasto por produto.</li>
                                            <li><strong>Venda:</strong> Coloque impostos, taxas e a margem de lucro líquido que deseja.</li>
                                        </ol>
                                        <p className="mt-2 text-xs italic">O "Raio-X" mostrará o preço ideal de venda e o preço mínimo (sem lucro) para não ter prejuízo.</p>
                                    </div>

                                    <div className="border-t border-slate-700 pt-4 mt-4 text-center text-xs text-slate-500">
                                        <p>Seus dados são sincronizados automaticamente em nuvem de forma segura.</p>
                                    </div>
                                </div>
                                
                                {/* Rodapé do Modal com Botões de Backup */}
                                <div className="p-4 bg-[#05121d] border-t border-[#F59425]/30 text-center flex flex-col gap-3">
                                    <button 
                                        onClick={() => setIsHelpOpen(false)}
                                        className="bg-[#F59425] text-white w-full px-6 py-2 rounded-lg hover:bg-orange-600 transition-colors font-bold shadow-[0_0_10px_#F59425]"
                                    >
                                        Entendi, vamos lucrar!
                                    </button>
                                    
                                    <div className="flex justify-center gap-4 mt-2 border-t border-slate-700 pt-4">
                                        <button onClick={handleExportBackup} className="text-xs text-slate-400 hover:text-white underline flex items-center gap-1">
                                            <Icons.Download size={14} /> Exportar Backup (Segurança)
                                        </button>
                                        <label className="text-xs text-slate-400 hover:text-[#F59425] underline flex items-center gap-1 cursor-pointer">
                                            <Icons.Repeat size={14} /> Importar para a Nuvem
                                            <input type="file" accept=".json" className="hidden" onChange={handleImportBackup} />
                                        </label>
                                    </div>
                                </div>

                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Financeiro pronto para uso offline!', reg.scope))
                    .catch((err) => console.log('Falha ao registrar offline:', err));
            });
        }
    </script>
</body>
</html>
